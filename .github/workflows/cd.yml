name: Backend CD (Docker Hub)

on:
  push:
    branches:
      - main

jobs:
  docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore PathFinder_Backend.sln

      - name: Build solution
        run: dotnet build PathFinder_Backend.sln --no-restore

      - name: Run database migrations
        run: dotnet run --project PathFinder.DatabaseMigrator/PathFinder.DatabaseMigrator.csproj --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          ASPNETCORE_ENVIRONMENT: Production

      - name: Set Image Name
        run: echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-backend" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        run: |
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PathFinder'
          images: '${{ secrets.DOCKERHUB_USERNAME }}/pathfinder-backend:latest'
          app-settings: |
            BlobConnectionString=${{ secrets.AZURE_BLOB_CONNECTION_STRING }}
            BlobContainerName=${{ secrets.AZURE_BLOB_CONTAINER_NAME }}